<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERAL FITNESS— Luxury Fitness Chennai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dark: #9a7a2e;
    --black: #080808;
    --dark: #0e0e0e;
    --dark2: #141414;
    --dark3: #1a1a1a;
    --white: #f5f0e8;
    --muted: #7a7060;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Montserrat', sans-serif;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--sans);
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 99999;
    transition: transform 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 99998;
    transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), width 0.3s, height 0.3s;
  }
  .cursor.expand { transform: scale(3); }
  .cursor-ring.expand { width: 56px; height: 56px; border-color: var(--gold); }

  /* Grain overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:9000;
    opacity:0.4;
  }

  /* ─── NAV ─── */
  header {
    position: fixed; top:0; left:0; right:0;
    z-index: 1000;
    padding: 0 6%;
    display: flex; align-items:center; justify-content:space-between;
    height: 80px;
    border-bottom: 1px solid transparent;
    transition: background 0.5s, border-color 0.5s;
  }
  header.scrolled {
    background: rgba(8,8,8,0.95);
    border-color: rgba(201,168,76,0.15);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    line-height: 1;
  }
  .logo span { font-style: italic; color: var(--white); font-size: 13px; display:block; letter-spacing: 0.3em; margin-top:3px; font-family: var(--sans); font-weight: 200; }

  nav ul {
    display: flex; gap: 40px; list-style:none;
  }
  nav ul li a {
    text-decoration:none;
    color: rgba(245,240,232,0.6);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
  }
  nav ul li a::after {
    content:'';
    position:absolute; bottom:-4px; left:0; right:0; height:1px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s;
  }
  nav ul li a:hover { color: var(--gold); }
  nav ul li a:hover::after { transform: scaleX(1); }

  .nav-cta {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold) !important;
    padding: 10px 24px !important;
    font-size: 10px !important;
    letter-spacing: 0.25em !important;
    transition: background 0.3s, color 0.3s !important;
  }
  .nav-cta::after { display:none !important; }
  .nav-cta:hover { background: var(--gold) !important; color: var(--black) !important; }

  .hamburger { display:none; flex-direction:column; gap:5px; cursor:none; }
  .hamburger span { width:24px; height:1px; background:var(--gold); display:block; transition:0.3s; }

  /* ─── HERO ─── */
  .hero {
    height: 100vh;
    position: relative;
    display: flex; align-items: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset:0;
    background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1800&q=80') center/cover no-repeat;
    transform: scale(1.08);
    animation: heroZoom 12s ease-out forwards;
  }
  @keyframes heroZoom { to { transform: scale(1); } }

  .hero-overlay {
    position:absolute; inset:0;
    background: linear-gradient(105deg, rgba(8,8,8,0.88) 0%, rgba(8,8,8,0.5) 60%, rgba(8,8,8,0.2) 100%);
  }

  .hero-line {
    position:absolute; left:0; top:0; bottom:0;
    width: 4px;
    background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity:0;
    animation: lineReveal 1.5s 0.5s forwards;
  }
  @keyframes lineReveal { to { opacity:1; } }

  .hero-content {
    position:relative; z-index:2;
    padding: 0 8%;
    max-width: 800px;
  }

  .hero-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity:0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(54px, 8vw, 100px);
    font-weight: 300;
    line-height: 1.0;
    margin-bottom: 28px;
    opacity:0;
    animation: fadeUp 0.9s 0.8s forwards;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--gold);
    display: block;
  }

  .hero-desc {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.08em;
    line-height: 1.9;
    color: rgba(245,240,232,0.65);
    max-width: 380px;
    margin-bottom: 48px;
    opacity:0;
    animation: fadeUp 0.9s 1.0s forwards;
  }

  .hero-actions {
    display: flex; gap: 20px; align-items:center;
    opacity:0;
    animation: fadeUp 0.9s 1.2s forwards;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--black);
    padding: 16px 40px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .btn-primary::before {
    content:'';
    position:absolute; inset:0;
    background: var(--gold-light);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
  }
  .btn-primary:hover::before { transform: translateX(0); }
  .btn-primary span { position:relative; z-index:1; }

  .btn-ghost {
    background: transparent;
    color: var(--white);
    padding: 16px 40px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border: 1px solid rgba(245,240,232,0.3);
    cursor: none;
    transition: border-color 0.3s, color 0.3s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .hero-stats {
    position:absolute; bottom: 60px; right: 8%;
    display:flex; gap:50px;
    z-index:2;
    opacity:0;
    animation: fadeUp 0.9s 1.4s forwards;
  }
  .stat { text-align:center; }
  .stat-num {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    display:block;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    margin-top: 8px;
    display:block;
  }

  .scroll-indicator {
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    opacity:0; animation: fadeUp 0.9s 1.6s forwards;
  }
  .scroll-indicator span { font-size:9px; letter-spacing:0.3em; color:rgba(245,240,232,0.3); text-transform:uppercase; }
  .scroll-line { width:1px; height:60px; background: linear-gradient(to bottom, var(--gold), transparent); animation: scrollPulse 2s infinite; }
  @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  /* ─── SECTIONS ─── */
  section { position:relative; }

  .section-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display:block;
  }

  .section-title {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 62px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .section-title em { font-style:italic; color:var(--gold); }

  /* ─── MARQUEE ─── */
  .marquee-wrap {
    background: var(--gold);
    padding: 18px 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .marquee-track {
    display: inline-block;
    animation: marquee 25s linear infinite;
  }
  .marquee-track span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--black);
    margin: 0 40px;
  }
  .marquee-track span::before { content: '◆'; margin-right:40px; opacity:0.5; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ─── ABOUT ─── */
  .about {
    padding: 140px 8%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    align-items: center;
    background: var(--dark);
  }

  .about-visual {
    position:relative;
  }
  .about-img {
    width:100%; aspect-ratio: 3/4;
    object-fit:cover;
    display:block;
    filter: grayscale(20%);
  }
  .about-frame {
    position:absolute; inset: -16px;
    border: 1px solid var(--gold);
    z-index: -1;
    opacity: 0.3;
  }
  .about-badge {
    position:absolute; bottom:-24px; right:-24px;
    width: 130px; height:130px;
    background: var(--gold);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:2px;
  }
  .about-badge strong {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 300;
    color: var(--black);
    line-height:1;
  }
  .about-badge span {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--black);
    text-transform: uppercase;
    text-align:center;
  }

  .about-text p {
    font-size: 14px;
    line-height: 2;
    color: rgba(245,240,232,0.6);
    margin-bottom: 32px;
  }

  .about-features {
    display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:40px;
  }
  .feature-item {
    border-top: 1px solid rgba(201,168,76,0.25);
    padding-top: 16px;
  }
  .feature-item h4 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .feature-item p {
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    line-height: 1.6;
    margin:0 !important;
  }

  /* ─── SERVICES ─── */
  .services {
    padding: 140px 8%;
    background: var(--black);
  }
  .services-header {
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom: 80px;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .service-card {
    background: var(--dark2);
    padding: 52px 40px;
    position:relative;
    overflow:hidden;
    transition: background 0.4s;
    cursor: none;
  }
  .service-card::before {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:2px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s;
  }
  .service-card:hover { background: var(--dark3); }
  .service-card:hover::before { transform: scaleX(1); }

  .service-num {
    font-family: var(--serif);
    font-size: 72px;
    font-weight: 300;
    color: rgba(201,168,76,0.08);
    position:absolute; top:24px; right:30px;
    line-height:1;
    transition: color 0.4s;
  }
  .service-card:hover .service-num { color: rgba(201,168,76,0.15); }

  .service-icon {
    width: 44px; height: 44px;
    border: 1px solid rgba(201,168,76,0.3);
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 28px;
    font-size: 18px;
    transition: border-color 0.3s, background 0.3s;
  }
  .service-card:hover .service-icon {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .service-card h3 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 16px;
    transition: color 0.3s;
  }
  .service-card:hover h3 { color: var(--gold); }

  .service-card p {
    font-size: 13px;
    line-height: 1.8;
    color: rgba(245,240,232,0.45);
    margin-bottom: 28px;
  }

  .service-link {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
    display:flex; align-items:center; gap:10px;
    transition: color 0.3s, gap 0.3s;
  }
  .service-card:hover .service-link { color: var(--gold); gap:16px; }
  .service-link::after { content:'→'; }

  /* ─── PLANS ─── */
  .plans {
    padding: 140px 8%;
    background: var(--dark);
    position:relative;
    overflow:hidden;
  }
  .plans::before {
    content:'';
    position:absolute; top:-200px; right:-200px;
    width:600px; height:600px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
    pointer-events:none;
  }

  .plans-header { text-align:center; margin-bottom: 80px; }
  .plans-header .section-label { justify-content:center; display:flex; }

  .plans-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .plan-card {
    background: var(--dark2);
    padding: 52px 36px;
    position:relative;
    border: 1px solid transparent;
    transition: border-color 0.4s, transform 0.3s;
  }
  .plan-card:hover { transform: translateY(-6px); }

  .plan-card.featured {
    background: var(--dark3);
    border-color: var(--gold);
  }

  .plan-badge {
    position:absolute; top:-1px; left:50%; transform:translateX(-50%);
    background: var(--gold);
    color: var(--black);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.25em;
    padding: 6px 18px;
    text-transform: uppercase;
    white-space:nowrap;
  }

  .plan-tier {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    display:block;
  }
  .plan-card.featured .plan-tier { color: var(--gold); }

  .plan-price {
    font-family: var(--serif);
    margin-bottom: 40px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 36px;
  }
  .price-symbol { font-size:20px; color: var(--gold); vertical-align:top; margin-top:12px; display:inline-block; }
  .price-amount {
    font-size: 64px;
    font-weight: 300;
    color: var(--white);
    line-height:1;
  }
  .price-period { font-size:14px; color:var(--muted); font-family:var(--sans); font-weight:300; }

  .plan-features {
    list-style:none;
    margin-bottom: 44px;
    display:flex; flex-direction:column; gap:14px;
  }
  .plan-features li {
    font-size: 13px;
    color: rgba(245,240,232,0.6);
    display:flex; align-items:center; gap:12px;
  }
  .plan-features li::before {
    content:'';
    width:6px; height:1px;
    background: var(--gold);
    flex-shrink:0;
  }
  .plan-features li.inactive { color: rgba(245,240,232,0.2); }
  .plan-features li.inactive::before { background: rgba(245,240,232,0.15); }

  .plan-btn {
    width:100%;
    padding: 15px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: none;
    transition: 0.3s;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--gold);
  }
  .plan-card.featured .plan-btn {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }
  .plan-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--black); }

  /* ─── CONTACT ─── */
  .contact {
    padding: 140px 8%;
    background: var(--black);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    align-items: start;
  }

  .contact-info h2 { margin-bottom: 28px; }
  .contact-info p {
    font-size:14px; line-height:2;
    color:rgba(245,240,232,0.5);
    margin-bottom: 60px;
  }

  .contact-details { display:flex; flex-direction:column; gap:30px; }
  .contact-detail { display:flex; gap:20px; align-items:flex-start; }
  .detail-icon {
    width:40px; height:40px;
    border:1px solid rgba(201,168,76,0.2);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
    color: var(--gold);
  }
  .detail-text h4 {
    font-size:10px; letter-spacing:0.3em;
    text-transform:uppercase; color:var(--gold);
    margin-bottom:5px;
  }
  .detail-text p { font-size:13px; color:rgba(245,240,232,0.5); margin:0; line-height:1.6; }

  .contact-form { display:flex; flex-direction:column; gap:0; }

  .form-group {
    position:relative;
    border-bottom: 1px solid rgba(245,240,232,0.1);
    transition: border-color 0.3s;
    margin-bottom: 8px;
  }
  .form-group:focus-within { border-color: var(--gold); }

  .form-group label {
    position:absolute; top:20px; left:0;
    font-size: 10px;
    font-weight:500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    transition: 0.3s;
    pointer-events:none;
  }
  .form-group input:focus ~ label,
  .form-group input:not(:placeholder-shown) ~ label,
  .form-group textarea:focus ~ label,
  .form-group textarea:not(:placeholder-shown) ~ label {
    top: 0; font-size:9px; color: var(--gold);
  }

  .form-group input,
  .form-group textarea {
    width:100%;
    background:transparent;
    border:none; outline:none;
    padding: 32px 0 14px;
    color: var(--white);
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 300;
    resize: none;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: transparent; }

  .form-group textarea { height:100px; padding-top:36px; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:24px; }

  .submit-btn {
    margin-top: 40px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 18px 50px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: none;
    align-self: flex-start;
    position:relative; overflow:hidden;
    transition: color 0.3s;
  }
  .submit-btn::before {
    content:'';
    position:absolute; inset:0;
    background: var(--gold);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
    z-index:0;
  }
  .submit-btn:hover::before { transform: translateY(0); }
  .submit-btn:hover { color: var(--black); }
  .submit-btn span { position:relative; z-index:1; }

  /* ─── FOOTER ─── */
  footer {
    background: var(--dark);
    border-top: 1px solid rgba(201,168,76,0.12);
    padding: 60px 8% 40px;
  }

  .footer-top {
    display:grid; grid-template-columns: 2fr 1fr 1fr;
    gap:60px; margin-bottom:60px;
    padding-bottom:60px;
    border-bottom:1px solid rgba(245,240,232,0.06);
  }

  .footer-brand .logo { font-size:20px; margin-bottom:16px; display:block; }
  .footer-brand p { font-size:13px; color:rgba(245,240,232,0.35); line-height:1.9; max-width:280px; }

  .footer-col h4 {
    font-size:10px; letter-spacing:0.35em;
    text-transform:uppercase; color:var(--gold);
    margin-bottom:24px;
  }
  .footer-col ul { list-style:none; display:flex; flex-direction:column; gap:12px; }
  .footer-col ul li a {
